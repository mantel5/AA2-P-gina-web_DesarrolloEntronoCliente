version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend/database.sqlite:/app/database.sqlite
    environment:
      - JWT_SECRET=supersecretkey

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
